body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999; opacity:0.03;

}
@keyframes swing { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes spin { to{transform:rotate(360deg)} }
.anim-fade-up { animation: fadeUp 0.35s ease both; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDpAICTxGAQ1KmCr3Uh9OE8TGRSISkL_yU",
  authDomain: "home-kitchen-f4b84.firebaseapp.com",
  databaseURL: "https://home-kitchen-f4b84-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "home-kitchen-f4b84",
  storageBucket: "home-kitchen-f4b84.firebasestorage.app",
  messagingSenderId: "659887502728",
  appId: "1:659887502728:web:13a9aebdcb329a9528b63d"
});
const db = getDatabase(app);
const KEY = "JM2026";

window._fb = {
  onDishes: cb => onValue(ref(db,"dishes"), s => {
    const v=s.val(); cb(v?Object.entries(v).map(([id,d])=>({id,...d})):[]);
  }),
  onOrders: cb => onValue(ref(db,"orders"), s => {
    const v=s.val(); cb(v?Object.entries(v).map(([id,o])=>({id,...o})).sort((a,b)=>b.ts-a.ts):[]);
  }),
  addDish:  dish  => push(ref(db,"dishes"), {...dish,  _key:KEY}),
  delDish:  id    => remove(ref(db,"dishes/"+id)),
  addOrder: order => push(ref(db,"orders"), {...order, _key:KEY}),
};
window._fbReady = true;
window.dispatchEvent(new Event("fb-ready"));
</script>

/* ── helpers ── */
function Toast({message,visible}){
  return <div style={{position:'fixed',top:'50%',left:'50%',transform:`translate(-50%,-50%) scale(${visible?1:0.85})`,background:'rgba(44,24,16,0.9)',color:'#FDF6EC',padding:'13px 22px',borderRadius:30,fontSize:14,letterSpacing:1,zIndex:9999,opacity:visible?1:0,transition:'all 0.28s',pointerEvents:'none',maxWidth:'80vw',textAlign:'center',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{message}</div>;
}
function Lantern({delay=0}){return <span style={{fontSize:20,display:'inline-block',animation:`swing 3s ease-in-out ${delay}s infinite`}}>🏮</span>;}
function SectionTitle({children,inline}){
  if(inline) return <span style={{fontFamily:"'Noto Serif SC',serif",fontSize:15,color:'var(--amber-d)',letterSpacing:1}}>{children}</span>;
  return <div style={{fontFamily:"'Noto Serif SC',serif",fontSize:14,color:'var(--amber-d)',display:'flex',alignItems:'center',gap:10,margin:'14px 0 12px',letterSpacing:1.5}}><div style={{flex:1,height:1,background:'linear-gradient(to right,transparent,var(--amber-l),transparent)'}}/>{children}<div style={{flex:1,height:1,background:'linear-gradient(to right,transparent,var(--amber-l),transparent)'}}/></div>;
}
function ModalBase({onClose,children}){
  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(44,24,16,0.65)',zIndex:900,display:'flex',alignItems:'center',justifyContent:'center',padding:24,backdropFilter:'blur(4px)',animation:'fadeIn 0.25s ease'}}><div style={{background:'var(--cream)',borderRadius:24,padding:28,width:'100%',maxWidth:380,boxShadow:'0 20px 60px rgba(44,24,16,0.35)',position:'relative',animation:'fadeUp 0.3s ease'}}><button onClick={onClose} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--brown-l)',lineHeight:1}}>×</button>{children}</div></div>;
}

/* ── modals ── */
function LoginModal({onLogin,onClose,t}){
  const [name,setName]=useState('');
  const [pwd,setPwd]=useState('');
  const [err,setErr]=useState(false);
  const go=()=>{if(!onLogin(pwd,name)){setErr(true);setTimeout(()=>setErr(false),2000);}};
  return <ModalBase onClose={onClose}>
    <div style={{textAlign:'center',marginBottom:22}}><div style={{fontSize:32,marginBottom:8}}>🔑</div><div style={{fontFamily:"'Noto Serif SC',serif",fontSize:20,color:'var(--brown)',fontWeight:700}}>{t.loginTitle}</div><div style={{fontSize:12,color:'var(--brown-l)',marginTop:4}}>{t.loginSub}</div></div>
    <div style={{marginBottom:12}}><div style={{fontSize:12,color:'var(--brown-l)',marginBottom:6}}>{t.yourName}</div><input value={name} onChange={e=>setName(e.target.value)} placeholder={t.namePh2.split('，')[0]} style={{width:'100%',border:'1.5px solid #E8DDD0',borderRadius:12,padding:'12px 14px',fontSize:15,fontFamily:"'Noto Sans SC',sans-serif",background:'var(--warm)',outline:'none'}}/></div>
    <div style={{marginBottom:16}}><div style={{fontSize:12,color:'var(--brown-l)',marginBottom:6}}>{t.pwdLabel}</div><input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} style={{width:'100%',border:`1.5px solid ${err?'var(--red)':'#E8DDD0'}`,borderRadius:12,padding:'13px 14px',fontSize:16,fontFamily:"'Noto Sans SC',sans-serif",background:'var(--warm)',outline:'none'}}/>{err&&<div style={{fontSize:12,color:'var(--red)',marginTop:6}}>{t.wrongPwd}</div>}</div>
    <button onClick={go} style={{width:'100%',background:'linear-gradient(135deg,var(--amber-d),var(--amber))',color:'white',border:'none',borderRadius:14,padding:16,fontSize:16,cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif",letterSpacing:3}}>{t.loginBtn}</button>
  </ModalBase>;
}

    <button onClick={go} style={{width:'100%',background:'linear-gradient(135deg,var(--amber-d),var(--amber-l))',color:'white',border:'none',borderRadius:14,padding:16,fontSize:16,cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif",letterSpacing:3}}>{t.joinBtn}</button>

/* ── Menu Tab ── */
function MenuTab({dishes,cart,addToCart,changeCart,t,lang}){
  if(!dishes.length) return <div style={{textAlign:'center',padding:'80px 30px',color:'var(--brown-l)'}}><div style={{fontSize:52,marginBottom:16}}>🍳</div><p style={{fontSize:14,lineHeight:2,whiteSpace:'pre-line'}}>{t.emptyMenu}</p></div>;
  return <div style={{padding:'12px 12px 0'}}>
    <SectionTitle>{lang==='zh'?"今日特供 · Today's Specials":"Today's Specials · 今日特供"}</SectionTitle>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
      {dishes.map((d,i)=>{
        const c=cart[d.id]||0;
        return <div key={d.id} className="anim-fade-up" style={{animationDelay:`${i*0.06}s`,background:'white',borderRadius:16,overflow:'hidden',boxShadow:'0 3px 14px var(--shadow)'}}>
          <div style={{width:'100%',aspectRatio:'1',background:'var(--paper)',overflow:'hidden'}}>
            {d.photo?<img src={d.photo} alt={d.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:52,background:'linear-gradient(135deg,#F5EDD8,#EDD9B5)'}}>{d.emoji||'🍽️'}</div>}
          </div>
          <div style={{padding:'10px 10px 8px'}}>
            <div style={{fontFamily:"'Noto Serif SC',serif",fontSize:14,fontWeight:600,color:'var(--brown)',marginBottom:3}}>{d.name}</div>
            {d.desc&&<div style={{fontSize:10,color:'var(--brown-l)',lineHeight:1.5,marginBottom:8,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{d.desc}</div>}
            {c===0?<button onClick={()=>addToCart(d.id)} style={{width:'100%',background:'linear-gradient(135deg,var(--amber),var(--amber-l))',color:'white',border:'none',borderRadius:20,padding:'9px 6px',fontSize:13,cursor:'pointer',letterSpacing:1,fontFamily:"'Noto Sans SC',sans-serif",boxShadow:'0 2px 8px rgba(200,135,58,0.4)'}}>{t.wantBtn}</button>
            :<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>

              <span style={{fontFamily:"'Noto Serif SC',serif",fontSize:18,fontWeight:700,color:'var(--brown)',minWidth:20,textAlign:'center'}}>{c}</span>

}

/* ─── MAIN APP ─────────────────────────────────────────────────────────────── */
function App(){
  const [lang,setLang]=useState('zh');
  const t=T[lang];
  const [role,setRole]=useState(null);
  const [userName,setUserName]=useState('');
  const [showLogin,setShowLogin]=useState(false);
  const [showAccess,setShowAccess]=useState(false);
  const [showWelcome,setShowWelcome]=useState(true);
  const [connecting,setConnecting]=useState(true);
  const [tab,setTab]=useState('menu');
  const [dishes,setDishes]=useState([]);
  const [orders,setOrders]=useState([]);
  const [cart,setCart]=useState({});
  const [showReceipt,setShowReceipt]=useState(false);
  const [receipt,setReceipt]=useState(null);
  const [toast,setToast]=useState({msg:'',vis:false});
  const ttRef=useRef(null);

  const canManage=role==='admin'||role==='manager';
  const cartCount=Object.values(cart).reduce((a,b)=>a+b,0);
  const cartDishCount=Object.keys(cart).filter(id=>cart[id]>0).length;

  // Firebase
  useEffect(()=>{
    const init=()=>{
      if(!window._fb){setTimeout(init,100);return;}
      window._fb.onDishes(d=>{setDishes(d);setConnecting(false);});
      window._fb.onOrders(o=>setOrders(o));
    };
    if(window._fbReady) init();
    else window.addEventListener('fb-ready',init,{once:true});
    const t2=setTimeout(()=>setConnecting(false),7000);
    return()=>clearTimeout(t2);
  },[]);

  const showToast=useCallback(msg=>{clearTimeout(ttRef.current);setToast({msg,vis:true});ttRef.current=setTimeout(()=>setToast(s=>({...s,vis:false})),2300);},[]);

  // auth
  const login=(pwd,name)=>{
    if(pwd!==ADMIN_PASSWORD)return false;
    const n=name?.trim()||(lang==='zh'?'管理员':'Admin');
    setRole('admin');setUserName(n);setShowLogin(false);setShowWelcome(false);return true;
  };
  const joinAccess=(code,name)=>{
    if(code!==MANAGER_CODE)return false;
    const n=name?.trim()||(lang==='zh'?'家人':'Family');
    setRole('manager');setUserName(n);setShowAccess(false);setShowWelcome(false);showToast(t.accessInfo);return true;
  };
  const guestAccess=name=>{
    const n=(typeof name==='string'?name:'').trim()||(lang==='zh'?'家人':'Family');
    setRole('guest');setUserName(n);setShowWelcome(false);
  };
  const logout=()=>{setRole(null);setUserName('');setCart({});setShowWelcome(true);setTab('menu');};

  // dishes
  const addDish=async d=>{await window._fb.addDish(d);showToast(t.dishAdded);};
  const deleteDish=async id=>{if(!window.confirm(t.delConfirm))return;await window._fb.delDish(id);setCart(c=>{const n={...c};delete n[id];return n;});showToast(t.dishDel);};

  // cart
  const changeCart=(id,delta)=>setCart(c=>{const n={...c};n[id]=(n[id]||0)+delta;if(n[id]<=0)delete n[id];return n;});
  const addToCart=id=>{setCart(c=>({...c,[id]:1}));showToast(t.addedToCart);};

  // order
  const placeOrder=async()=>{
    const items=Object.entries(cart).filter(([,q])=>q>0).map(([id,qty])=>{const d=dishes.find(x=>x.id===id);return{id,name:d?.name,emoji:d?.emoji,photo:d?.photo||null,qty};});
    if(!items.length)return;
    const note=LOVE_NOTES[Math.floor(Math.random()*LOVE_NOTES.length)];
    const order={items,by:userName,role,ts:Date.now(),note};
    await window._fb.addOrder(order);
    setReceipt({...order,id:'local'});setShowReceipt(true);setCart({});showToast(t.orderOk);
  };

  if(showWelcome) return <>
    <WelcomeScreen lang={lang} setLang={setLang} t={t}
      onAdmin={()=>setShowLogin(true)} onAccess={()=>setShowAccess(true)} onGuest={guestAccess}
      showLogin={showLogin} setShowLogin={setShowLogin}
      showAccess={showAccess} setShowAccess={setShowAccess}
      login={login} joinAccess={joinAccess} connecting={connecting}/>
    <Toast message={toast.msg} visible={toast.vis}/>
  </>;

  const roleLabel=role==='admin'?t.roleAdmin:role==='manager'?t.roleManager:t.roleGuest;

  return <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--cream)'}}>
    {/* Header */}
    <div style={{background:'var(--brown)',position:'sticky',top:0,zIndex:100,boxShadow:'0 3px 16px rgba(44,24,16,0.35)'}}>
      <div style={{padding:'14px 16px 10px',textAlign:'center',position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:2}}>
          <Lantern/><span style={{fontFamily:"'Noto Serif SC',serif",fontSize:20,fontWeight:700,letterSpacing:4,color:'#FFE4A0',textShadow:'0 0 20px rgba(255,200,80,0.4)'}}>{t.appTitle}</span><Lantern delay={1.5}/>
        </div>
        <div style={{fontSize:10,color:'rgba(255,228,160,0.55)',letterSpacing:2}}>{t.appSub}</div>
        {/* role badge */}
        <div style={{position:'absolute',left:10,top:14}}>
          <span style={{fontSize:10,color:'rgba(255,228,160,0.65)',background:'rgba(255,228,160,0.1)',border:'1px solid rgba(255,228,160,0.2)',borderRadius:20,padding:'2px 9px'}}>{roleLabel}{userName?` · ${userName}`:''}</span>
        </div>
        {/* lang + logout */}
        <div style={{position:'absolute',right:10,top:12,display:'flex',alignItems:'center',gap:6}}>
          <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} style={{background:'rgba(255,228,160,0.15)',border:'1px solid rgba(255,228,160,0.3)',borderRadius:20,color:'#FFE4A0',fontSize:11,padding:'3px 8px',cursor:'pointer'}}>{lang==='zh'?'EN':'中'}</button>
          {/* ── Proper logout button ── */}
          <button onClick={logout} style={{background:'rgba(255,228,160,0.1)',border:'1px solid rgba(255,228,160,0.25)',borderRadius:20,color:'rgba(255,228,160,0.8)',fontSize:11,padding:'3px 9px',cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif",letterSpacing:0.3,whiteSpace:'nowrap'}}>{t.logoutBtn}</button>
        </div>
      </div>
      {/* Tabs */}
      <div style={{display:'flex',background:'rgba(0,0,0,0.2)'}}>
        {['menu','cart',...(canManage?['admin','notifications']:[])].map(k=>{
          const labels={menu:t.menuTab,cart:t.cartTab,admin:t.adminTab,notifications:t.notifTab};
          const active=tab===k;
          return <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'11px 4px',background:'none',border:'none',cursor:'pointer',color:active?'#FFE4A0':'rgba(255,228,160,0.55)',fontSize:12,fontFamily:"'Noto Sans SC',sans-serif",letterSpacing:0.5,borderBottom:active?'2px solid #E8A85A':'2px solid transparent',transition:'all 0.2s',whiteSpace:'nowrap'}}>
            {k==='cart'&&cartCount>0?<>{t.cartTab}<span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',background:'var(--red)',color:'white',borderRadius:'50%',width:16,height:16,fontSize:10,fontWeight:700,verticalAlign:'middle',marginLeft:2}}>{cartCount}</span></>:labels[k]}
          </button>;
        })}
      </div>
    </div>

    {/* Content */}
    <div style={{flex:1,overflowY:'auto',paddingBottom:tab==='menu'||tab==='cart'?90:20}}>
      {tab==='menu'          &&<MenuTab dishes={dishes} cart={cart} addToCart={addToCart} changeCart={changeCart} t={t} lang={lang}/>}
      {tab==='cart'          &&<CartTab dishes={dishes} cart={cart} changeCart={changeCart} t={t} lang={lang}/>}
      {tab==='admin'         &&canManage&&<AdminTab dishes={dishes} onAdd={addDish} onDelete={deleteDish} t={t} lang={lang} role={role}/>}
      {tab==='notifications' &&canManage&&<NotifsTab orders={orders} t={t} lang={lang}/>}
    </div>

    {/* Bottom bar */}
    {(tab==='menu'||tab==='cart')&&<div style={{position:'fixed',bottom:0,left:0,right:0,background:'white',padding:'12px 16px 20px',boxShadow:'0 -4px 20px rgba(92,61,46,0.12)',display:'flex',gap:12,alignItems:'center',zIndex:50}}>
      <div style={{flex:1}}>
        <div style={{fontFamily:"'Noto Serif SC',serif",fontSize:15,color:'var(--brown)',fontWeight:600}}>{cartDishCount>0?`${t.totalItems} ${cartDishCount} ${lang==='zh'?t.items:'dish'+(cartDishCount>1?'es':'')}`:(lang==='zh'?'还没有选菜～':'Nothing selected~')}</div>
        <div style={{fontSize:11,color:'var(--brown-l)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'55vw'}}>{Object.keys(cart).filter(id=>cart[id]>0).map(id=>dishes.find(d=>d.id===id)?.name).filter(Boolean).join('、')}</div>
      </div>
      <button onClick={placeOrder} disabled={cartDishCount===0} style={{background:cartDishCount>0?'linear-gradient(135deg,var(--red),#E05A46)':'#DDD',color:'white',border:'none',borderRadius:25,padding:'14px 24px',fontSize:15,fontFamily:"'Noto Sans SC',sans-serif",cursor:cartDishCount>0?'pointer':'not-allowed',letterSpacing:2,boxShadow:cartDishCount>0?'0 4px 14px rgba(200,75,58,0.4)':'none',transition:'all 0.2s',whiteSpace:'nowrap'}}>{t.orderBtn}</button>
    </div>}

    {showReceipt&&receipt&&<ReceiptModal receipt={receipt} onClose={()=>setShowReceipt(false)} t={t} lang={lang} showToast={showToast}/>}
    <Toast message={toast.msg} visible={toast.vis}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
