body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999; opacity:0.03;

@keyframes swing { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes dealIn { from{opacity:0;transform:translateY(-60px) rotate(var(--r)) scale(0.7)} to{opacity:1;transform:translateY(0) rotate(var(--r)) scale(1)} }
@keyframes fanSpread { from{transform:translateX(-50%) rotate(var(--r)) translateY(60px) scale(0.8);opacity:0} to{transform:translateX(-50%) rotate(var(--r)) translateY(0) scale(1);opacity:1} }
@keyframes cardPulse { 0%,100%{box-shadow:0 8px 32px rgba(155,96,40,0.35),0 0 0 0 rgba(200,160,80,0.4)} 50%{box-shadow:0 8px 32px rgba(155,96,40,0.35),0 0 0 8px rgba(200,160,80,0)} }
@keyframes flipCard { 0%{transform:rotateY(0)} 50%{transform:rotateY(90deg)} 100%{transform:rotateY(0)} }
@keyframes shimmerMucha { 0%{background-position:200% center} 100%{background-position:-200% center} }
@keyframes revealCard { 0%{transform:scale(1) rotateY(90deg)} 60%{transform:scale(1.25) rotateY(-8deg)} 100%{transform:scale(1.2) rotateY(0)} }
@keyframes glowPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
@keyframes floatUp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes shuffleCard { from{transform:translateY(0) rotate(var(--r,0deg))} to{transform:translateY(-14px) rotate(var(--r,0deg))} }
@keyframes deckEntry { from{opacity:0;transform:translateX(-50%) rotate(var(--angle,0deg)) translateY(20px) scale(0.85)} to{opacity:1;transform:translateX(-50%) rotate(var(--angle,0deg)) translateY(0) scale(1)} }
@keyframes dealRow { from{opacity:0;transform:translateY(-80px) scale(0.7) rotate(var(--r,8deg))} to{opacity:1;transform:translateY(0) scale(1) rotate(0deg)} }

.anim-fade-up { animation: fadeUp 0.35s ease both; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDpAICTxGAQ1KmCr3Uh9OE8TGRSISkL_yU",
  authDomain: "home-kitchen-f4b84.firebaseapp.com",
  databaseURL: "https://home-kitchen-f4b84-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "home-kitchen-f4b84",
  storageBucket: "home-kitchen-f4b84.firebasestorage.app",
  messagingSenderId: "659887502728",
  appId: "1:659887502728:web:13a9aebdcb329a9528b63d"
});
const db = getDatabase(app);
const KEY = "JM2026";

window._fb = {
  onDishes: cb => onValue(ref(db,"dishes"), s => {
    const v=s.val(); cb(v?Object.entries(v).map(([id,d])=>({id,...d})):[]);
  }),
  onOrders: cb => onValue(ref(db,"orders"), s => {
    const v=s.val(); cb(v?Object.entries(v).map(([id,o])=>({id,...o})).sort((a,b)=>b.ts-a.ts):[]);
  }),
  addDish:  dish  => push(ref(db,"dishes"), {...dish,  _key:KEY}),
  delDish:  id    => remove(ref(db,"dishes/"+id)),
  addOrder: order => push(ref(db,"orders"), {...order, _key:KEY}),
};
window._fbReady = true;
window.dispatchEvent(new Event("fb-ready"));
</script>

/* ── helpers ── */
function Toast({message,visible}){
  return <div style={{position:'fixed',top:'50%',left:'50%',transform:`translate(-50%,-50%) scale(${visible?1:0.85})`,background:'rgba(44,24,16,0.9)',color:'#FDF6EC',padding:'13px 22px',borderRadius:30,fontSize:14,letterSpacing:1,zIndex:9999,opacity:visible?1:0,transition:'all 0.28s',pointerEvents:'none',maxWidth:'80vw',textAlign:'center',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{message}</div>;
}
function Lantern({delay=0}){return <span style={{fontSize:20,display:'inline-block',animation:`swing 3s ease-in-out ${delay}s infinite`}}>🏮</span>;}
function SectionTitle({children,inline}){
  if(inline) return <span style={{fontFamily:"'Noto Serif SC',serif",fontSize:15,color:'var(--amber-d)',letterSpacing:1}}>{children}</span>;
  return <div style={{fontFamily:"'Noto Serif SC',serif",fontSize:14,color:'var(--amber-d)',display:'flex',alignItems:'center',gap:10,margin:'14px 0 12px',letterSpacing:1.5}}><div style={{flex:1,height:1,background:'linear-gradient(to right,transparent,var(--amber-l),transparent)'}}/>{children}<div style={{flex:1,height:1,background:'linear-gradient(to right,transparent,var(--amber-l),transparent)'}}/></div>;
}
function ModalBase({onClose,children}){
  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(44,24,16,0.65)',zIndex:900,display:'flex',alignItems:'center',justifyContent:'center',padding:24,backdropFilter:'blur(4px)',animation:'fadeIn 0.25s ease'}}><div style={{background:'var(--cream)',borderRadius:24,padding:28,width:'100%',maxWidth:380,boxShadow:'0 20px 60px rgba(44,24,16,0.35)',position:'relative',animation:'fadeUp 0.3s ease'}}><button onClick={onClose} style={{position:'absolute',top:16,right:16,background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--brown-l)',lineHeight:1}}>×</button>{children}</div></div>;
}

/* ── modals ── */
function LoginModal({onLogin,onClose,t}){
  const [name,setName]=useState('');
  const [pwd,setPwd]=useState('');
  const [err,setErr]=useState(false);
  const go=()=>{if(!onLogin(pwd,name)){setErr(true);setTimeout(()=>setErr(false),2000);}};
  return <ModalBase onClose={onClose}>
    <div style={{textAlign:'center',marginBottom:22}}><div style={{fontSize:32,marginBottom:8}}>🔑</div><div style={{fontFamily:"'Noto Serif SC',serif",fontSize:20,color:'var(--brown)',fontWeight:700}}>{t.loginTitle}</div><div style={{fontSize:12,color:'var(--brown-l)',marginTop:4}}>{t.loginSub}</div></div>

    <div style={{marginBottom:16}}><div style={{fontSize:12,color:'var(--brown-l)',marginBottom:6}}>{t.pwdLabel}</div><input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} style={{width:'100%',border:`1.5px solid ${err?'var(--red)':'#E8DDD0'}`,borderRadius:12,padding:'13px 14px',fontSize:16,fontFamily:"'Noto Sans SC',sans-serif",background:'var(--warm)',outline:'none'}}/>{err&&<div style={{fontSize:12,color:'var(--red)',marginTop:6}}>{t.wrongPwd}</div>}</div>

/* ── CSV parser (no library needed) ── */
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  // detect delimiter: comma or semicolon
  const delim=lines[0].includes(';')?';':',';
  const headers=lines[0].split(delim).map(h=>h.trim().toLowerCase().replace(/"/g,''));
  const col=k=>headers.findIndex(h=>h===k||h.includes(k));
  const iName=col('name')||col('菜名')||col('名');
  const iDesc=Math.max(col('desc'),col('介绍'),col('description'));
  const iEmoji=Math.max(col('emoji'),col('图标'),col('表情'));
  return lines.slice(1).map(line=>{
    // simple CSV split respecting quoted fields
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===delim&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=ch;
    }
    cells.push(cur.trim());
    const name=(cells[iName]||'').replace(/"/g,'').trim();
    if(!name)return null;
    return{name,desc:(iDesc>=0?cells[iDesc]||'':'').replace(/"/g,'').trim(),emoji:(iEmoji>=0?cells[iEmoji]||'':'').replace(/"/g,'').trim()||'🍽️'};
  }).filter(Boolean);
}

/* ── Download CSV template ── */
function downloadTemplate(){
  const bom='\uFEFF'; // UTF-8 BOM so Excel opens Chinese correctly
  const csv=bom+'菜名,介绍,emoji\n红烧肉,慢火炖两小时软糯入味,🥩\n清蒸鱼,新鲜草鱼葱姜蒸制,🐟\n蒜蓉西兰花,大蒜爆香清脆爽口,🥦\n番茄蛋汤,家常暖心老味道,🍅\n';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='菜单模板.csv';a.click();
}

/* ── Image compressor ─────────────────────────────────────────────────────────
   Draws the image onto a canvas at reduced size, then exports as JPEG.
   maxKB: target file size ceiling (default 100 KB)
   maxPx: longest edge in pixels (default 900)
   Returns { dataUrl, kb } */
// Accurately measure base64 data URL size in KB
function dataUrlKB(dataUrl){
  const base64=dataUrl.split(',')[1]||'';
  const padding=(base64.endsWith('==')?2:base64.endsWith('=')?1:0);
  return Math.round((base64.length*3/4-padding)/1024);
}

async function compressImage(file, maxKB=100, maxPx=900){
  const origKb=Math.round(file.size/1024);
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let {naturalWidth:w,naturalHeight:h}=img;
      if(w>maxPx||h>maxPx){
        if(w>=h){h=Math.round(h*maxPx/w);w=maxPx;}
        else{w=Math.round(w*maxPx/h);h=maxPx;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      // Binary-search JPEG quality; keep best (smallest passing) result
      let lo=0.1, hi=0.92, bestUrl='', bestKb=9999, iter=0;
      while(iter++<14){
        const q=(lo+hi)/2;
        const candidate=canvas.toDataURL('image/jpeg',q);
        const kb=dataUrlKB(candidate);
        if(kb<=maxKB){
          bestUrl=candidate; bestKb=kb; lo=q;
        } else {
          hi=q;
        }
        if(hi-lo<0.015) break;
      }
      // Edge case: even q=0.1 is too big — force lowest quality
      if(!bestUrl){
        bestUrl=canvas.toDataURL('image/jpeg',0.1);
        bestKb=dataUrlKB(bestUrl);
      }
      resolve({dataUrl:bestUrl, kb:bestKb, origKb, w, h});
    };
    img.onerror=reject;
    img.src=url;
  });
}

/* ── Deck fan — all cards back-face, spread by count ── */
function DeckFan({count, animKey}){
  const total = Math.min(count, 14);
  const spread = Math.min(5 + total * 5.5, 70);
  return (
    <div style={{position:'relative',width:160,height:200,margin:'0 auto'}}>
      {Array.from({length:total}).map((_,i)=>{
        const angle = total===1 ? 0 : -spread/2 + (spread/(total-1))*i;
        const yOff  = Math.pow(Math.abs(angle)/spread*2,1.5)*18;
        return (
          <div key={`${animKey}-${i}`} style={{
            position:'absolute', left:'50%', top:yOff,
            width:88, height:130,
            transform:`translateX(-50%) rotate(${angle}deg)`,
            transformOrigin:'50% 110%',
            borderRadius:9, overflow:'hidden',
            boxShadow:'0 4px 14px rgba(0,0,0,0.4)',
            animation:`deckEntry 0.55s cubic-bezier(0.22,1.2,0.5,1) ${i*0.045}s both`,
          }}>
            <MuchaCardBack/>
          </div>
        );
      })}
    </div>
  );
}

/* ── Single row card — back or front, flips on reveal ── */
function RowCard({dish, index, phase, chosen, onPick}){
  const [flipped, setFlipped] = React.useState(false);
  const isMe      = chosen === index;
  const isDealt   = phase === 'dealt' || phase === 'pick' || phase === 'revealed';
  const isPick    = phase === 'pick';
  const isRevealed= phase === 'revealed';
  const dimmed    = isRevealed && !isMe;

  React.useEffect(()=>{
    if(isRevealed && isMe && !flipped) setFlipped(true);
  },[isRevealed, isMe]);

  // entry: cards fly in from deck position (centre-top) to their row slot
  // each card delays slightly
  const entryDelay = `${index * 0.12}s`;

  return (
    <div
      onClick={()=>{ if(isPick) onPick(index); }}
      style={{
        width:105, height:155, flexShrink:0,
        cursor: isPick ? 'pointer' : 'default',
        opacity: dimmed ? 0.28 : 1,
        filter: dimmed ? 'brightness(0.4)' : 'none',
        transform: isRevealed && isMe ? 'scale(1.22) translateY(-10px)' : 'scale(1)',
        transition:'transform 0.5s cubic-bezier(0.34,1.4,0.64,1), opacity 0.4s, filter 0.35s',
        animation: isDealt ? `dealRow 0.55s cubic-bezier(0.22,1.2,0.5,1) ${entryDelay} both` : 'none',
        perspective:800, position:'relative',
      }}
    >
      {/* 3-D flip inner */}
      <div style={{
        width:'100%', height:'100%',
        position:'relative', transformStyle:'preserve-3d',
        transition: flipped ? 'transform 0.6s ease' : 'none',
        transform: flipped ? 'rotateY(180deg)' : 'rotateY(0)',
        borderRadius:12,
        boxShadow: isRevealed && isMe
          ? '0 18px 48px rgba(0,0,0,0.7), 0 0 30px rgba(200,135,58,0.55)'
          : isPick
            ? '0 8px 28px rgba(0,0,0,0.55)'
            : '0 5px 18px rgba(0,0,0,0.4)',
      }}>
        <div style={{position:'absolute',inset:0,backfaceVisibility:'hidden',
          WebkitBackfaceVisibility:'hidden',borderRadius:12,overflow:'hidden'}}>
          <MuchaCardBack/>
        </div>
        <div style={{position:'absolute',inset:0,backfaceVisibility:'hidden',
          WebkitBackfaceVisibility:'hidden',transform:'rotateY(180deg)',
          borderRadius:12,overflow:'hidden'}}>
          <CardFace dish={dish}/>
        </div>
      </div>
      {/* hover ring when pickable */}
      {isPick && (
        <div style={{
          position:'absolute',inset:-3,borderRadius:15,pointerEvents:'none',
          border:'1.5px solid rgba(200,160,80,0)',
          transition:'border-color 0.2s, box-shadow 0.2s',
        }}/>
      )}
    </div>
  );
}

/* ── Blind Box Tab (Mucha style) ── */
function BlindBoxTab({dishes,addToCart,t,lang}){
  // phases: idle → shuffling → dealt → pick → revealed
  const [phase,  setPhase]  = React.useState('idle');
  const [cards,  setCards]  = React.useState([]);   // 3 drawn dishes
  const [chosen, setChosen] = React.useState(null);
  const [fanKey, setFanKey] = React.useState(0);    // re-trigger fan anim on reset
  const timer = React.useRef(null);
  React.useEffect(()=>()=>clearTimeout(timer.current),[]);

  const draw = ()=>{
    if(!dishes.length) return;
    const pool = [...dishes].sort(()=>Math.random()-0.5);
    setCards(pool.slice(0, Math.min(3, pool.length)));
    setChosen(null);
    setPhase('shuffling');
    // after shuffle animation, deal 3 cards into a row
    timer.current = setTimeout(()=>setPhase('dealt'), 1600);
    // brief pause then let user pick

    if(phase !== 'pick') return;
    setChosen(i);
    setPhase('revealed');

    setPhase('idle');

            <button onClick={draw} style={{
              background:'linear-gradient(135deg,#7A3E10,#C8873A,#E8A850)',
              border:'1px solid rgba(232,168,80,0.35)',
              borderRadius:32,padding:'15px 42px',fontSize:15,
              color:'#FFF5DC',fontFamily:"'Noto Serif SC',serif",
              letterSpacing:3,cursor:'pointer',
              boxShadow:'0 6px 24px rgba(100,50,0,0.55),inset 0 1px 0 rgba(255,220,100,0.2)',
            }}>✦ {zh?'开始抽卡':'Draw Cards'} ✦</button>
          </div>
        )}

        {/* ━━━ SHUFFLING: animated card pile ━━━ */}
        {phase==='shuffling' && (
          <div style={{textAlign:'center'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:22}}>
              {[0,1,2,3,4].map(i=>(
                <div key={i} style={{
                  width:72,height:106,borderRadius:9,overflow:'hidden',
                  margin:'0 -9px',position:'relative',
                  boxShadow:'0 5px 18px rgba(0,0,0,0.45)',
                  zIndex:i===2?5:3,
                  animation:`shuffleCard 0.36s ease-in-out ${i*0.08}s infinite alternate`,
                  transform:`rotate(${(i-2)*9}deg)`,
                }}>
                  <MuchaCardBack/>
                </div>
              ))}
            </div>
            <div style={{fontFamily:"'Crimson Pro',serif",fontStyle:'italic',
              fontSize:14,color:'rgba(200,155,70,0.75)',letterSpacing:2,
              animation:'glowPulse 1s ease-in-out infinite'}}>{t.shuffling}</div>
          </div>
        )}

        {/* ━━━ DEALT / PICK / REVEALED: three cards in a horizontal row ━━━ */}
        {(phase==='dealt'||phase==='pick'||phase==='revealed') && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:0,width:'100%'}}>

            {/* three cards row */}
            <div style={{
              display:'flex',
              flexDirection:'row',
              justifyContent:'center',
              alignItems:'flex-end',
              gap:14,
              padding:'0 12px',
              minHeight:200,
            }}>
              {cards.map((dish,i)=>(
                <RowCard
                  key={dish.id}
                  dish={dish}
                  index={i}
                  phase={phase}
                  chosen={chosen}
                  onPick={pickCard}
                />
              ))}
            </div>

            {/* hint text */}
            {phase==='pick' && (
              <div style={{
                marginTop:18,
                fontFamily:"'Crimson Pro',serif",fontStyle:'italic',
                fontSize:13,color:'rgba(200,155,70,0.65)',letterSpacing:1.5,
                animation:'glowPulse 2s ease-in-out infinite',textAlign:'center',
              }}>✦ {t.drawHint} ✦</div>
            )}
          </div>
        )}
      </div>

      {/* ━━━ Revealed info panel ━━━ */}
      {phase==='revealed' && chosen!==null && (
        <div style={{
          padding:'0 18px 36px',width:'100%',maxWidth:380,
          animation:'fadeUp 0.4s ease 0.3s both',
          position:'relative',zIndex:5,
        }}>
          <div style={{
            background:'linear-gradient(145deg,rgba(38,20,8,0.97),rgba(22,10,3,0.97))',
            border:'1px solid rgba(200,135,58,0.38)',
            borderRadius:22,padding:'20px 20px 18px',
            backdropFilter:'blur(10px)',
            boxShadow:'0 10px 36px rgba(0,0,0,0.5)',
          }}>
            <div style={{textAlign:'center',marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center',marginBottom:10}}>
                <div style={{flex:1,height:1,background:'linear-gradient(to right,transparent,rgba(200,135,58,0.4))'}}/>
                <span style={{color:'rgba(200,135,58,0.55)',fontSize:11}}>✦ ✦ ✦</span>
                <div style={{flex:1,height:1,background:'linear-gradient(to left,transparent,rgba(200,135,58,0.4))'}}/>
              </div>
              <div style={{fontFamily:"'Noto Serif SC',serif",fontSize:20,fontWeight:700,
                color:'#FFE4A0',letterSpacing:3,marginBottom:6}}>
                {cards[chosen]?.emoji||'🍽️'} {cards[chosen]?.name}
              </div>
              {cards[chosen]?.desc && (
                <div style={{fontFamily:"'Crimson Pro',serif",fontStyle:'italic',
                  fontSize:13,color:'rgba(200,155,70,0.65)',lineHeight:1.7,letterSpacing:0.3}}>
                  {cards[chosen].desc}
                </div>
              )}
            </div>
            <button onClick={reset} style={{
              width:'100%',padding:'14px 0',borderRadius:14,
              background:'linear-gradient(135deg,#7A3E10,#C8873A)',
              border:'none',color:'#FFF5DC',fontSize:14,
              fontFamily:"'Noto Sans SC',sans-serif",cursor:'pointer',letterSpacing:1,
              boxShadow:'0 5px 18px rgba(100,50,0,0.45)',
            }}>✦ {t.again} ✦</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Receipt Modal ── */
function ReceiptModal({receipt,onClose,t,lang,showToast}){
  const d=new Date(receipt.ts);const wd=t.weekdays[d.getDay()];
  const dateStr=lang==='zh'?`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · 周${wd}`:d.toDateString().slice(4);
  const timeStr=`${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(44,24,16,0.7)',zIndex:800,display:'flex',alignItems:'flex-end',justifyContent:'center',backdropFilter:'blur(3px)',animation:'fadeIn 0.25s ease'}}>
    <div style={{background:'var(--cream)',borderRadius:'24px 24px 0 0',width:'100%',maxHeight:'90vh',overflowY:'auto',animation:'slideUp 0.35s ease'}}>
      <div style={{width:40,height:4,background:'#D0C4B8',borderRadius:2,margin:'12px auto 16px'}}/>
      <div style={{margin:'0 14px 12px',background:'#FFFDF8',borderRadius:16,overflow:'hidden',boxShadow:'0 4px 20px rgba(92,61,46,0.2)'}}>
        <div style={{background:'var(--brown)',textAlign:'center',padding:'22px 20px 18px'}}>
          <div style={{fontSize:26,marginBottom:6}}>🏮 🏮 🏮</div>
          <div style={{fontFamily:"'Noto Serif SC',serif",fontSize:22,letterSpacing:5,color:'#FFE4A0',textShadow:'0 0 20px rgba(255,200,80,0.4)',marginBottom:3}}>{t.storeName}</div>
          <div style={{fontFamily:"'Crimson Pro',serif",fontStyle:'italic',fontSize:13,color:'rgba(255,228,160,0.55)',letterSpacing:2}}>{t.storeTag}</div>
          <div style={{marginTop:14,borderTop:'1px dashed rgba(255,228,160,0.2)',paddingTop:10,fontSize:11,color:'rgba(255,228,160,0.6)'}}>{lang==='zh'?'点餐人':'Ordered by'}: <strong style={{color:'rgba(255,228,160,0.85)'}}>{receipt.by||'—'}</strong></div>
        </div>
        <div style={{padding:'18px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--brown-l)',marginBottom:14}}><span>{dateStr}</span><span>{timeStr}</span></div>
          <hr style={{border:'none',borderTop:'1px dashed #D0C4B8',margin:'0 0 12px'}}/>
          {receipt.items?.map(item=><div key={item.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid #F0E8D8'}}><span style={{fontSize:20}}>{item.emoji||'🍽️'}</span><span style={{flex:1,fontFamily:"'Noto Serif SC',serif",fontSize:14,color:'var(--brown)'}}>{item.name}</span><span style={{fontSize:13,color:'var(--brown-l)',background:'#F0E8D8',borderRadius:20,padding:'2px 10px'}}>×{item.qty}</span></div>)}
          <div style={{marginTop:16,padding:'13px 15px',background:'linear-gradient(135deg,#FFF3E0,#FFE8C0)',borderRadius:12,textAlign:'center'}}><div style={{fontSize:20,color:'var(--amber-l)',marginBottom:4}}>❝</div><div style={{fontFamily:"'Noto Serif SC',serif",fontSize:13,color:'var(--amber-d)',lineHeight:1.8,letterSpacing:1}}>{receipt.note?.[lang]}</div><div style={{fontFamily:"'Crimson Pro',serif",fontStyle:'italic',fontSize:12,color:'rgba(155,96,40,0.6)',marginTop:6}}>{lang==='zh'?receipt.note?.en:receipt.note?.zh}</div></div>
          <div style={{textAlign:'center',marginTop:14,paddingTop:14,borderTop:'1px dashed #D0C4B8'}}><span style={{display:'inline-block',border:'2px solid var(--red)',color:'var(--red)',fontFamily:"'Noto Serif SC',serif",fontSize:16,padding:'5px 14px',borderRadius:4,transform:'rotate(-8deg)',opacity:0.75,letterSpacing:3}}>用心制作</span><div style={{marginTop:10,fontSize:11,color:'#B0A090',letterSpacing:1}}>家人健康 · 岁月静好</div></div>
        </div>
      </div>
      <div style={{display:'flex',gap:10,padding:'0 14px 32px'}}>
        <button onClick={onClose} style={{flex:1,padding:15,borderRadius:14,border:'none',background:'#F0E8D8',color:'var(--brown)',fontSize:14,cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif"}}>{t.closeBtn}</button>
        <button onClick={()=>showToast(t.shotTip)} style={{flex:2,padding:15,borderRadius:14,border:'none',background:'linear-gradient(135deg,var(--red),#E05A46)',color:'white',fontSize:14,cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif",boxShadow:'0 3px 12px rgba(200,75,58,0.35)'}}>{t.shotBtn}</button>
      </div>
    </div>
  </div>;
}

/* ─── MAIN APP ─────────────────────────────────────────────────────────────── */
function App(){
  const [lang,setLang]=useState('zh');
  const t=T[lang];
  const [role,setRole]=useState(null);
  const [userName,setUserName]=useState('');
  const [showLogin,setShowLogin]=useState(false);
  const [showAccess,setShowAccess]=useState(false);
  const [showWelcome,setShowWelcome]=useState(true);
  const [connecting,setConnecting]=useState(true);
  const [tab,setTab]=useState('menu');
  const [dishes,setDishes]=useState([]);
  const [orders,setOrders]=useState([]);
  const [cart,setCart]=useState({});
  const [showReceipt,setShowReceipt]=useState(false);
  const [receipt,setReceipt]=useState(null);
  const [toast,setToast]=useState({msg:'',vis:false});
  const ttRef=useRef(null);

  const canManage=role==='admin'||role==='manager';
  const cartCount=Object.values(cart).reduce((a,b)=>a+b,0);
  const cartDishCount=Object.keys(cart).filter(id=>cart[id]>0).length;

  // Firebase
  useEffect(()=>{
    const init=()=>{
      if(!window._fb){setTimeout(init,100);return;}
      window._fb.onDishes(d=>{setDishes(d);setConnecting(false);});
      window._fb.onOrders(o=>setOrders(o));
    };
    if(window._fbReady) init();
    else window.addEventListener('fb-ready',init,{once:true});
    const t2=setTimeout(()=>setConnecting(false),7000);
    return()=>clearTimeout(t2);
  },[]);

  const showToast=useCallback(msg=>{clearTimeout(ttRef.current);setToast({msg,vis:true});ttRef.current=setTimeout(()=>setToast(s=>({...s,vis:false})),2300);},[]);

  // auth
  const login=(pwd,name)=>{
    if(pwd!==ADMIN_PASSWORD)return false;
    const n=name?.trim()||(lang==='zh'?'管理员':'Admin');
    setRole('admin');setUserName(n);setShowLogin(false);setShowWelcome(false);return true;
  };
  const joinAccess=(code,name)=>{
    if(code!==MANAGER_CODE)return false;
    const n=name?.trim()||(lang==='zh'?'家人':'Family');
    setRole('manager');setUserName(n);setShowAccess(false);setShowWelcome(false);showToast(t.accessInfo);return true;
  };
  const guestAccess=name=>{
    const n=(typeof name==='string'?name:'').trim()||(lang==='zh'?'家人':'Family');
    setRole('guest');setUserName(n);setShowWelcome(false);
  };
  const logout=()=>{setRole(null);setUserName('');setCart({});setShowWelcome(true);setTab('menu');};

  // dishes
  const addDish=async d=>{await window._fb.addDish(d);showToast(t.dishAdded);};
  const deleteDish=async id=>{if(!window.confirm(t.delConfirm))return;await window._fb.delDish(id);setCart(c=>{const n={...c};delete n[id];return n;});showToast(t.dishDel);};

  // cart
  const changeCart=(id,delta)=>setCart(c=>{const n={...c};n[id]=(n[id]||0)+delta;if(n[id]<=0)delete n[id];return n;});
  const addToCart=id=>{setCart(c=>({...c,[id]:1}));showToast(t.addedToCart);};

  // order
  const placeOrder=async()=>{
    const items=Object.entries(cart).filter(([,q])=>q>0).map(([id,qty])=>{const d=dishes.find(x=>x.id===id);return{id,name:d?.name,emoji:d?.emoji,photo:d?.photo||null,qty};});
    if(!items.length)return;
    const note=LOVE_NOTES[Math.floor(Math.random()*LOVE_NOTES.length)];
    const order={items,by:userName,role,ts:Date.now(),note};
    await window._fb.addOrder(order);
    setReceipt({...order,id:'local'});setShowReceipt(true);setCart({});showToast(t.orderOk);
  };

  if(showWelcome) return <>
    <WelcomeScreen lang={lang} setLang={setLang} t={t}
      onAdmin={()=>setShowLogin(true)} onAccess={()=>setShowAccess(true)} onGuest={guestAccess}
      showLogin={showLogin} setShowLogin={setShowLogin}
      showAccess={showAccess} setShowAccess={setShowAccess}
      login={login} joinAccess={joinAccess} connecting={connecting}/>
    <Toast message={toast.msg} visible={toast.vis}/>
  </>;

  const roleLabel=role==='admin'?t.roleAdmin:role==='manager'?t.roleManager:t.roleGuest;

  return <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--cream)'}}>
    {/* Header */}
    <div style={{background:'var(--brown)',position:'sticky',top:0,zIndex:100,boxShadow:'0 3px 16px rgba(44,24,16,0.35)'}}>
      <div style={{padding:'14px 16px 10px',textAlign:'center',position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:2}}>
          <Lantern/><span style={{fontFamily:"'Noto Serif SC',serif",fontSize:20,fontWeight:700,letterSpacing:4,color:'#FFE4A0',textShadow:'0 0 20px rgba(255,200,80,0.4)'}}>{t.appTitle}</span><Lantern delay={1.5}/>
        </div>
        <div style={{fontSize:10,color:'rgba(255,228,160,0.55)',letterSpacing:2}}>{t.appSub}</div>
        {/* role badge */}
        <div style={{position:'absolute',left:10,top:14}}>
          <span style={{fontSize:10,color:'rgba(255,228,160,0.65)',background:'rgba(255,228,160,0.1)',border:'1px solid rgba(255,228,160,0.2)',borderRadius:20,padding:'2px 9px'}}>{roleLabel}{userName?` · ${userName}`:''}</span>
        </div>
        {/* lang + logout */}
        <div style={{position:'absolute',right:10,top:12,display:'flex',alignItems:'center',gap:6}}>
          <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} style={{background:'rgba(255,228,160,0.15)',border:'1px solid rgba(255,228,160,0.3)',borderRadius:20,color:'#FFE4A0',fontSize:11,padding:'3px 8px',cursor:'pointer'}}>{lang==='zh'?'EN':'中'}</button>
          {/* ── Proper logout button ── */}
          <button onClick={logout} style={{background:'rgba(255,228,160,0.1)',border:'1px solid rgba(255,228,160,0.25)',borderRadius:20,color:'rgba(255,228,160,0.8)',fontSize:11,padding:'3px 9px',cursor:'pointer',fontFamily:"'Noto Sans SC',sans-serif",letterSpacing:0.3,whiteSpace:'nowrap'}}>{t.logoutBtn}</button>
        </div>
      </div>
      {/* Tabs */}
      <div style={{display:'flex',background:'rgba(0,0,0,0.2)'}}>
        {['menu','cart','blindbox',...(canManage?['admin','notifications']:[])].map(k=>{
          const labels={menu:t.menuTab,cart:t.cartTab,admin:t.adminTab,notifications:t.notifTab,blindbox:t.blindBoxTab};
          const active=tab===k;
          return <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'11px 4px',background:'none',border:'none',cursor:'pointer',color:active?'#FFE4A0':'rgba(255,228,160,0.55)',fontSize:12,fontFamily:"'Noto Sans SC',sans-serif",letterSpacing:0.5,borderBottom:active?'2px solid #E8A85A':'2px solid transparent',transition:'all 0.2s',whiteSpace:'nowrap'}}>
            {k==='cart'&&cartCount>0?<>{t.cartTab}<span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',background:'var(--red)',color:'white',borderRadius:'50%',width:16,height:16,fontSize:10,fontWeight:700,verticalAlign:'middle',marginLeft:2}}>{cartCount}</span></>:labels[k]}
          </button>;
        })}
      </div>
    </div>

    {/* Content */}
    <div style={{flex:1,overflowY:'auto',paddingBottom:tab==='menu'||tab==='cart'?90:20}}>
      {tab==='menu'          &&<MenuTab dishes={dishes} cart={cart} addToCart={addToCart} changeCart={changeCart} t={t} lang={lang}/>}
      {tab==='cart'          &&<CartTab dishes={dishes} cart={cart} changeCart={changeCart} t={t} lang={lang}/>}
      {tab==='admin'         &&canManage&&<AdminTab dishes={dishes} onAdd={addDish} onDelete={deleteDish} t={t} lang={lang} role={role}/>}
      {tab==='notifications' &&canManage&&<NotifsTab orders={orders} t={t} lang={lang}/>}
      {tab==='blindbox'        &&<BlindBoxTab dishes={dishes} addToCart={addToCart} t={t} lang={lang}/>}
    </div>

    {/* Bottom bar */}
    {(tab==='menu'||tab==='cart')&&tab!=='blindbox'&&<div style={{position:'fixed',bottom:0,left:0,right:0,background:'white',padding:'12px 16px 20px',boxShadow:'0 -4px 20px rgba(92,61,46,0.12)',display:'flex',gap:12,alignItems:'center',zIndex:50}}>
      <div style={{flex:1}}>
        <div style={{fontFamily:"'Noto Serif SC',serif",fontSize:15,color:'var(--brown)',fontWeight:600}}>{cartDishCount>0?`${t.totalItems} ${cartDishCount} ${lang==='zh'?t.items:'dish'+(cartDishCount>1?'es':'')}`:(lang==='zh'?'还没有选菜～':'Nothing selected~')}</div>
        <div style={{fontSize:11,color:'var(--brown-l)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'55vw'}}>{Object.keys(cart).filter(id=>cart[id]>0).map(id=>dishes.find(d=>d.id===id)?.name).filter(Boolean).join('、')}</div>
      </div>
      <button onClick={placeOrder} disabled={cartDishCount===0} style={{background:cartDishCount>0?'linear-gradient(135deg,var(--red),#E05A46)':'#DDD',color:'white',border:'none',borderRadius:25,padding:'14px 24px',fontSize:15,fontFamily:"'Noto Sans SC',sans-serif",cursor:cartDishCount>0?'pointer':'not-allowed',letterSpacing:2,boxShadow:cartDishCount>0?'0 4px 14px rgba(200,75,58,0.4)':'none',transition:'all 0.2s',whiteSpace:'nowrap'}}>{t.orderBtn}</button>
    </div>}

    {showReceipt&&receipt&&<ReceiptModal receipt={receipt} onClose={()=>setShowReceipt(false)} t={t} lang={lang} showToast={showToast}/>}
    <Toast message={toast.msg} visible={toast.vis}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
